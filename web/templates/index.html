{% extends "base.html" %}

{% block content %}
<div class="row mt-3">
    <!-- Filtres -->
    <div class="col-md-3">
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-filter"></i> Filtres</h5>
            </div>
            <div class="card-body">
                <form id="filterForm">
                    <div class="mb-3">
                        <label class="form-label">Type d'evenement</label>
                        <select class="form-select" id="eventType">
                            <option value="">Tous</option>
                            <option value="festivals">Festivals</option>
                            <option value="expositions">Expositions</option>
                            <option value="hanabi">Hanabi (Feux d'artifice)</option>
                            <option value="marches">Marches aux puces</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Date debut</label>
                        <input type="date" class="form-control" id="startDateFrom">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Date fin</label>
                        <input type="date" class="form-control" id="startDateTo">
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-2">
                        <i class="fas fa-search"></i> Appliquer
                    </button>
                    <button type="button" class="btn btn-secondary w-100" id="resetBtn">
                        <i class="fas fa-undo"></i> Reinitialiser
                    </button>
                </form>

                <div class="mt-4" id="statsPanel">
                    <h6>Statistiques</h6>
                    <div id="statsContent">
                        <p class="text-muted">Chargement...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Carte -->
    <div class="col-md-9">
        <div class="card">
            <div class="card-body p-0">
                <div id="mapContainer" style="height: calc(100vh - 150px);">
                    <iframe id="mapFrame"
                            src="/api/map/generate"
                            style="width: 100%; height: 100%; border: none;">
                    </iframe>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    loadStatistics();

    document.getElementById('filterForm').addEventListener('submit', function(e) {
        e.preventDefault();
        applyFilters();
    });

    document.getElementById('resetBtn').addEventListener('click', function() {
        document.getElementById('filterForm').reset();
        applyFilters();
    });
});

function applyFilters() {
    const eventType = document.getElementById('eventType').value;
    const startDateFrom = document.getElementById('startDateFrom').value;
    const startDateTo = document.getElementById('startDateTo').value;

    const params = new URLSearchParams();
    if (eventType) params.append('event_type', eventType);
    if (startDateFrom) params.append('start_date_from', startDateFrom.replace(/-/g, '/'));
    if (startDateTo) params.append('start_date_to', startDateTo.replace(/-/g, '/'));

    document.getElementById('mapFrame').src = `/api/map/generate?${params.toString()}`;
}

function loadStatistics() {
    fetch('/api/events/stats')
        .then(response => response.json())
        .then(data => {
            const html = `
                <p class="mb-1"><strong>Total:</strong> ${data.total_events}</p>
                <hr>
                <p class="mb-1"><i class="fas fa-torii-gate text-danger"></i> Festivals: ${data.by_type.festivals}</p>
                <p class="mb-1"><i class="fas fa-palette text-primary"></i> Expositions: ${data.by_type.expositions}</p>
                <p class="mb-1"><i class="fas fa-burst text-warning"></i> Hanabi: ${data.by_type.hanabi}</p>
                <p class="mb-1"><i class="fas fa-store text-success"></i> Marches: ${data.by_type.marches}</p>
                <hr>
                <p class="mb-0"><strong>Avec GPS:</strong> ${data.with_gps_coordinates} (${data.gps_coverage_percent}%)</p>
            `;
            document.getElementById('statsContent').innerHTML = html;
        });
}
</script>
{% endblock %}
