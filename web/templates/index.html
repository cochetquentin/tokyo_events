{% extends "base.html" %}

{% block content %}
<div class="row mt-3">
    <!-- Filtres -->
    <div class="col-md-3">
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-filter"></i> Filtres</h5>
            </div>
            <div class="card-body">
                <form id="filterForm">
                    <div class="mb-3">
                        <label class="form-label">Type d'evenement</label>
                        <select class="form-select" id="eventType">
                            <option value="">Tous</option>
                            <option value="festivals">Festivals</option>
                            <option value="expositions">Expositions</option>
                            <option value="hanabi">Hanabi (Feux d'artifice)</option>
                            <option value="marches">Marches aux puces</option>
                            <option value="tokyo_cheapo">Tokyo Cheapo (Autres)</option>
                        </select>
                    </div>

                    <div class="mb-3" id="categoryGroupsContainer" style="display: none;">
                        <label class="form-label">Catégories (sélectionnez-en plusieurs)</label>
                        <div class="category-badges-grid" id="categoryBadgesGrid">
                            <!-- Badges générés dynamiquement par JavaScript -->
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Date debut</label>
                        <input type="date" class="form-control" id="startDateFrom">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Date fin</label>
                        <input type="date" class="form-control" id="startDateTo">
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-2">
                        <i class="fas fa-search"></i> Appliquer
                    </button>
                    <button type="button" class="btn btn-secondary w-100" id="resetBtn">
                        <i class="fas fa-undo"></i> Reinitialiser
                    </button>
                </form>

                <div class="mt-4" id="legendPanel">
                    <h6><i class="fas fa-map-marker"></i> Types d'événements</h6>
                    <div id="legendContent">
                        <p class="text-muted">Chargement...</p>
                    </div>
                </div>

                <div class="mt-4" id="eventsListPanel">
                    <h6><i class="fas fa-list"></i> Événements</h6>
                    <div id="eventsListContent" style="max-height: 400px; overflow-y: auto;">
                        <p class="text-muted">Chargement...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Carte -->
    <div class="col-md-9">
        <div class="card">
            <div class="card-body p-0">
                <div id="mapContainer" style="height: calc(100vh - 150px);">
                    <iframe id="mapFrame"
                            src="/api/map/generate"
                            style="width: 100%; height: 100%; border: none;">
                    </iframe>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Définir la date d'aujourd'hui par défaut
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('startDateFrom').value = today;
    document.getElementById('startDateTo').value = today;

    // Charger les badges si tokyo_cheapo est sélectionné au démarrage
    const eventType = document.getElementById('eventType').value;
    if (eventType === 'tokyo_cheapo') {
        document.getElementById('categoryGroupsContainer').style.display = 'block';
        loadCategoryBadges();
    }

    loadStatistics(); // Charger les stats au démarrage
    loadEventsList(); // Charger la liste des événements
    applyFilters(); // Appliquer les filtres au chargement

    document.getElementById('filterForm').addEventListener('submit', function(e) {
        e.preventDefault();
        applyFilters();
        loadStatistics(); // Mettre à jour les stats après application des filtres
        loadEventsList(); // Mettre à jour la liste des événements
    });

    document.getElementById('resetBtn').addEventListener('click', function() {
        document.getElementById('filterForm').reset();
        document.getElementById('startDateFrom').value = today;
        document.getElementById('startDateTo').value = today;
        document.getElementById('categoryGroupsContainer').style.display = 'none';
        selectedCategoryGroups.clear();
        applyFilters();
        loadStatistics();
        loadEventsList();
    });

    // Event listener pour afficher/masquer les category groups
    document.getElementById('eventType').addEventListener('change', function() {
        const categoryContainer = document.getElementById('categoryGroupsContainer');
        if (this.value === 'tokyo_cheapo') {
            categoryContainer.style.display = 'block';
            loadCategoryBadges();
        } else {
            categoryContainer.style.display = 'none';
            selectedCategoryGroups.clear();
        }
    });
});

// État global pour la multi-sélection
let selectedCategoryGroups = new Set();

function toggleCategoryGroup(badgeBtn) {
    const group = badgeBtn.dataset.group;

    if (selectedCategoryGroups.has(group)) {
        selectedCategoryGroups.delete(group);
        badgeBtn.classList.remove('active');
    } else {
        selectedCategoryGroups.add(group);
        badgeBtn.classList.add('active');
    }

    applyFilters();
    loadStatistics();
    loadEventsList();
}

async function loadCategoryBadges() {
    try {
        // Fetch metadata + stats en parallèle
        const [metadata, stats] = await Promise.all([
            fetch('/api/events/category-groups').then(r => r.json()),
            fetch('/api/events/stats?event_type=tokyo_cheapo').then(r => r.json())
        ]);

        // Générer HTML des badges
        const container = document.getElementById('categoryBadgesGrid');
        container.innerHTML = Object.entries(metadata).map(([key, data]) => `
            <button type="button"
                    class="category-badge ${selectedCategoryGroups.has(key) ? 'active' : ''}"
                    data-group="${key}"
                    onclick="toggleCategoryGroup(this)">
                <i class="fas fa-${data.icon}" style="color: ${data.color}"></i>
                <span>${data.label}</span>
                <small class="badge-count">(${stats.by_category_group[key] || 0})</small>
            </button>
        `).join('');
    } catch (error) {
        console.error('Error loading category badges:', error);
    }
}

function applyFilters() {
    const eventType = document.getElementById('eventType').value;
    const startDateFrom = document.getElementById('startDateFrom').value;
    const startDateTo = document.getElementById('startDateTo').value;

    const params = new URLSearchParams();
    if (eventType) params.append('event_type', eventType);

    // Multi-selection de category groups
    if (selectedCategoryGroups.size > 0) {
        params.append('category_groups', Array.from(selectedCategoryGroups).join(','));
    }

    if (startDateFrom) params.append('start_date_from', startDateFrom.replace(/-/g, '/'));
    if (startDateTo) params.append('start_date_to', startDateTo.replace(/-/g, '/'));

    document.getElementById('mapFrame').src = `/api/map/generate?${params.toString()}`;
}

function loadStatistics() {
    const eventType = document.getElementById('eventType').value;
    const startDateFrom = document.getElementById('startDateFrom').value;
    const startDateTo = document.getElementById('startDateTo').value;

    const params = new URLSearchParams();
    if (eventType) params.append('event_type', eventType);

    // Multi-selection de category groups
    if (selectedCategoryGroups.size > 0) {
        params.append('category_groups', Array.from(selectedCategoryGroups).join(','));
    }

    if (startDateFrom) params.append('start_date_from', startDateFrom.replace(/-/g, '/'));
    if (startDateTo) params.append('start_date_to', startDateTo.replace(/-/g, '/'));

    fetch(`/api/events/stats?${params.toString()}`)
        .then(response => response.json())
        .then(data => {
            let html = '';

            // Si tokyo_cheapo avec des category_groups sélectionnés, afficher la légende par catégorie
            if (eventType === 'tokyo_cheapo' && selectedCategoryGroups.size > 0 && data.by_category_group) {
                // Fetch metadata pour les icônes/couleurs
                fetch('/api/events/category-groups')
                    .then(r => r.json())
                    .then(metadata => {
                        html = '<h6 class="mb-2">Catégories sélectionnées</h6>';
                        for (const [key, count] of Object.entries(data.by_category_group)) {
                            if (selectedCategoryGroups.has(key) && count > 0) {
                                const group = metadata[key];
                                html += `<p class="mb-2"><i class="fas fa-${group.icon}" style="color: ${group.color}"></i> ${group.label}: <strong>${count}</strong></p>`;
                            }
                        }
                        html += `<hr><p class="mb-0"><strong>Total:</strong> ${data.total_events}</p>`;
                        document.getElementById('legendContent').innerHTML = html;
                    });
                return; // Exit early pour éviter le double update
            }

            // Sinon, afficher la légende standard par type
            html = `
                <p class="mb-2"><i class="fas fa-fire text-warning"></i> Hanabi: <strong>${data.by_type.hanabi || 0}</strong></p>
                <p class="mb-2"><i class="fas fa-music text-danger"></i> Festivals: <strong>${data.by_type.festivals || 0}</strong></p>
                <p class="mb-2"><i class="fas fa-palette text-primary"></i> Expositions: <strong>${data.by_type.expositions || 0}</strong></p>
                <p class="mb-2"><i class="fas fa-store text-success"></i> Marchés: <strong>${data.by_type.marches || 0}</strong></p>
                <p class="mb-2"><i class="fas fa-globe text-info"></i> Tokyo Cheapo: <strong>${data.by_type.tokyo_cheapo || 0}</strong></p>
                <hr>
                <p class="mb-0"><strong>Total:</strong> ${data.total_events}</p>
            `;
            document.getElementById('legendContent').innerHTML = html;
        })
        .catch(error => {
            console.error('Error loading statistics:', error);
            document.getElementById('legendContent').innerHTML = '<p class="text-danger">Erreur de chargement</p>';
        });
}

function loadEventsList() {
    const eventType = document.getElementById('eventType').value;
    const startDateFrom = document.getElementById('startDateFrom').value;
    const startDateTo = document.getElementById('startDateTo').value;

    const params = new URLSearchParams();
    if (eventType) params.append('event_type', eventType);

    // Multi-selection de category groups
    if (selectedCategoryGroups.size > 0) {
        params.append('category_groups', Array.from(selectedCategoryGroups).join(','));
    }

    if (startDateFrom) params.append('start_date_from', startDateFrom.replace(/-/g, '/'));
    if (startDateTo) params.append('start_date_to', startDateTo.replace(/-/g, '/'));

    fetch(`/api/events?${params.toString()}`)
        .then(response => response.json())
        .then(data => {
            const events = data.events;

            // Grouper par type
            const grouped = {
                'hanabi': [],
                'festivals': [],
                'expositions': [],
                'marches': [],
                'tokyo_cheapo': []
            };

            events.forEach(event => {
                if (grouped[event.event_type]) {
                    grouped[event.event_type].push(event);
                }
            });

            // Générer le HTML
            let html = '';
            const icons = {
                'hanabi': '<i class="fas fa-fire text-warning"></i>',
                'festivals': '<i class="fas fa-music text-danger"></i>',
                'expositions': '<i class="fas fa-palette text-primary"></i>',
                'marches': '<i class="fas fa-store text-success"></i>',
                'tokyo_cheapo': '<i class="fas fa-globe text-info"></i>'
            };
            const labels = {
                'hanabi': 'Hanabi',
                'festivals': 'Festivals',
                'expositions': 'Expositions',
                'marches': 'Marchés',
                'tokyo_cheapo': 'Tokyo Cheapo'
            };

            for (const [type, eventsList] of Object.entries(grouped)) {
                if (eventsList.length > 0) {
                    html += `<div class="mb-3">`;
                    html += `<h6 class="mb-2">${icons[type]} ${labels[type]} (${eventsList.length})</h6>`;
                    eventsList.forEach(event => {
                        html += `<div class="event-item mb-2 p-2" style="cursor: pointer; border-left: 3px solid; font-size: 0.9em;"
                                      onclick="focusOnEvent(${event.latitude}, ${event.longitude}, '${event.name.replace(/'/g, "\\'")}')">
                                    <strong>${event.name}</strong><br>
                                    <small class="text-muted">${event.location || ''}</small>
                                 </div>`;
                    });
                    html += `</div>`;
                }
            }

            if (html === '') {
                html = '<p class="text-muted">Aucun événement trouvé</p>';
            }

            document.getElementById('eventsListContent').innerHTML = html;
        })
        .catch(error => {
            console.error('Error loading events:', error);
            document.getElementById('eventsListContent').innerHTML = '<p class="text-danger">Erreur de chargement</p>';
        });
}

function focusOnEvent(lat, lon, name) {
    // Pour zoomer sur un événement, on doit communiquer avec l'iframe
    // On va recharger la carte en ajoutant des paramètres pour le centre et le zoom
    const eventType = document.getElementById('eventType').value;
    const startDateFrom = document.getElementById('startDateFrom').value;
    const startDateTo = document.getElementById('startDateTo').value;

    const params = new URLSearchParams();
    if (eventType) params.append('event_type', eventType);
    if (startDateFrom) params.append('start_date_from', startDateFrom.replace(/-/g, '/'));
    if (startDateTo) params.append('start_date_to', startDateTo.replace(/-/g, '/'));
    params.append('center_lat', lat);
    params.append('center_lon', lon);
    params.append('zoom', 15);

    document.getElementById('mapFrame').src = `/api/map/generate?${params.toString()}`;
}
</script>
{% endblock %}
