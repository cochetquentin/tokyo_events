{% extends "base.html" %}

{% block content %}
<div x-data class="mobile-page">

<!-- Bouton toggle filtres (mobile uniquement) -->
<div class="d-md-none mobile-filter-toggle">
    <button class="btn btn-sm btn-outline-secondary"
            @click="$store.mobileView.toggleFilters()">
        <i class="fas fa-filter"></i>
        <span class="ms-1" x-text="$store.mobileView.filtersOpen ? 'Masquer filtres' : 'Filtres'"></span>
        <i class="fas ms-1" :class="$store.mobileView.filtersOpen ? 'fa-chevron-up' : 'fa-chevron-down'" style="font-size:0.7rem"></i>
    </button>
    <span x-show="!$store.mobileView.filtersOpen" class="ms-2 text-secondary" style="font-size:0.8rem"
          x-text="$store.stats.totalEvents + ' événements'"></span>
</div>

<!-- Filtres en horizontal en haut -->
<div class="row mb-2 mobile-filters-row"
     :class="{ 'd-none d-md-flex': !$store.mobileView.filtersOpen, 'd-flex': $store.mobileView.filtersOpen }">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <form id="filterForm" @submit.prevent="$store.filters.applyFilters()">
                    <div class="row g-2 align-items-end">
                        <!-- Catégories -->
                        <div class="col-md-6">
                            <label class="form-label mb-1"><i class="fas fa-filter"></i> Catégories</label>
                            <div class="category-badges-grid">
                                <template x-for="[key, data] in Object.entries($store.filters.allCategoriesMetadata)" :key="key">
                                    <button
                                        type="button"
                                        class="category-badge"
                                        :class="{ 'active': $store.filters.isCategorySelected(key) }"
                                        @click="$store.filters.toggleCategory(key)">
                                        <i :class="`fas fa-${data.icon}`" :style="`color: ${data.color}`"></i>
                                        <span x-text="data.label"></span>
                                    </button>
                                </template>
                            </div>
                        </div>

                        <!-- Période -->
                        <div class="col-md-3">
                            <label class="form-label mb-1"><i class="fas fa-calendar"></i> Période</label>
                            <div class="row g-1">
                                <div class="col-3">
                                    <button type="button" class="btn btn-outline-primary btn-sm w-100" @click="$store.filters.setDateRange('today')">Auj.</button>
                                </div>
                                <div class="col-3">
                                    <button type="button" class="btn btn-outline-primary btn-sm w-100" @click="$store.filters.setDateRange('week')">Sem.</button>
                                </div>
                                <div class="col-3">
                                    <button type="button" class="btn btn-outline-primary btn-sm w-100" @click="$store.filters.setDateRange('month')">Mois</button>
                                </div>
                                <div class="col-3">
                                    <button type="button" class="btn btn-outline-primary btn-sm w-100" @click="$store.filters.setDateRange('3months')">3 mois</button>
                                </div>
                            </div>
                        </div>

                        <!-- Dates -->
                        <div class="col-md-2">
                            <label class="form-label mb-1">Du / Au</label>
                            <div class="row g-1">
                                <div class="col-6">
                                    <input type="date" class="form-control form-control-sm" x-model="$store.filters.dateFrom" @change="$store.filters.debouncedApplyFilters()">
                                </div>
                                <div class="col-6">
                                    <input type="date" class="form-control form-control-sm" x-model="$store.filters.dateTo" @change="$store.filters.debouncedApplyFilters()">
                                </div>
                            </div>
                        </div>

                        <!-- Actions -->
                        <div class="col-md-1">
                            <div class="d-flex gap-1">
                                <button type="submit" class="btn btn-primary btn-sm flex-fill" title="Appliquer">
                                    <i class="fas fa-search"></i>
                                </button>
                                <button type="button" class="btn btn-secondary btn-sm flex-fill" @click="$store.filters.resetFilters()" title="Réinitialiser">
                                    <i class="fas fa-undo"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Carte (83%) et Liste (17%) -->
<div class="row mb-0 g-0 mobile-content-row">
    <!-- Carte -->
    <div class="col-md-10" :class="{ 'd-none d-md-block': $store.mobileView.activeTab !== 'map' }">
        <div class="card">
            <div class="card-body p-0">
                <div id="mapContainer">
                    <!-- Loading State -->
                    <div x-show="$store.filters.loading" class="map-skeleton">
                        <div class="spinner"></div>
                        <p>Chargement de la carte...</p>
                    </div>

                    <!-- Map Iframe -->
                    <iframe
                        id="mapFrame"
                        src="/api/map/generate"
                        style="width: 100%; height: 100%; border: none;">
                    </iframe>
                </div>
            </div>
        </div>
    </div>

    <!-- Liste événements -->
    <div class="col-md-2" :class="{ 'd-none d-md-block': $store.mobileView.activeTab !== 'list' }">
        <div class="card">
            <div class="card-header bg-light">
                <h6 class="mb-0"><i class="fas fa-list"></i> Événements</h6>
            </div>
            <div class="card-body p-2">
                <!-- Stats -->
                <div id="legendPanel">
                    <div id="legendContent">
                        <!-- Loading State -->
                        <template x-if="$store.stats.loading">
                            <div class="skeleton skeleton-line"></div>
                        </template>

                        <!-- Stats Content -->
                        <template x-if="!$store.stats.loading">
                            <div>
                                <h6 class="mb-2">Catégories sélectionnées</h6>

                                <!-- Selected categories stats -->
                                <template x-for="key in Array.from($store.filters.selectedCategories)" :key="key">
                                    <template x-if="$store.stats.getCategoryCount(key) > 0">
                                        <p class="mb-2">
                                            <i :class="`fas fa-${$store.filters.allCategoriesMetadata[key]?.icon}`"
                                               :style="`color: ${$store.filters.allCategoriesMetadata[key]?.color}`"></i>
                                            <span x-text="$store.filters.allCategoriesMetadata[key]?.label"></span>:
                                            <strong x-text="$store.stats.getCategoryCount(key)"></strong>
                                        </p>
                                    </template>
                                </template>

                                <hr>
                                <p class="mb-0">
                                    <strong>Total:</strong>
                                    <strong x-text="$store.stats.totalEvents" class="text-gradient"></strong>
                                </p>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Events List -->
                <div id="eventsListContent">
                    <!-- Loading State -->
                    <template x-if="$store.events.loading">
                        <div>
                            <div class="skeleton skeleton-line skeleton-line--title"></div>
                            <div class="skeleton skeleton-line"></div>
                            <div class="skeleton skeleton-line short"></div>
                        </div>
                    </template>

                    <!-- Empty State -->
                    <template x-if="!$store.events.loading && $store.events.events.length === 0">
                        <div class="empty-state">
                            <i class="fas fa-calendar-times"></i>
                            <h3>Aucun événement trouvé</h3>
                            <p>Essayez d'élargir vos filtres</p>
                            <button @click="$store.filters.resetFilters()">Réinitialiser</button>
                        </div>
                    </template>

                    <!-- Events List -->
                    <template x-if="!$store.events.loading && $store.events.events.length > 0">
                        <div>
                            <!-- Group by type -->
                            <template x-for="group in Object.entries($store.events.groupedEvents)" :key="group[0]">
                                <div class="mb-3">
                                    <!-- Section Header -->
                                    <div class="event-section-header" :style="`color: ${$store.events.getTypeColor(group[0])}`">
                                        <i :class="`fas fa-${$store.events.getTypeIcon(group[0])}`"></i>
                                        <span x-text="`${$store.events.getTypeLabel(group[0])} (${group[1].length})`"></span>
                                    </div>

                                    <!-- Event Cards -->
                                    <template x-for="event in group[1]" :key="event.name + (event.start_date || '')">
                                        <div
                                            class="event-item"
                                            :style="`border-left-color: ${$store.events.getTypeColor(group[0])}`"
                                            @click="$store.events.focusOnEvent(event.latitude, event.longitude, event.name)">
                                            <i :class="`fas fa-${$store.events.getTypeIcon(group[0])} event-icon`" :style="`color: ${$store.events.getTypeColor(group[0])}`"></i>
                                            <strong x-text="event.name"></strong>
                                            <small x-text="event.location || event.start_date || ''"></small>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Error Toast -->
<div x-data x-show="$store.filters.error" x-transition class="toast-notification">
    <i class="fas fa-exclamation-circle"></i>
    <span x-text="$store.filters.error"></span>
    <button @click="$store.filters.error = null">×</button>
</div>

<!-- Tab Bar Mobile (visible uniquement < 768px) -->
<nav class="mobile-tab-bar d-md-none" x-data>
    <button class="mobile-tab-btn"
            :class="{ active: $store.mobileView.activeTab === 'map' }"
            @click="$store.mobileView.switchTab('map')">
        <i class="fas fa-map"></i>
        <span>Carte</span>
    </button>
    <button class="mobile-tab-btn"
            :class="{ active: $store.mobileView.activeTab === 'list' }"
            @click="$store.mobileView.switchTab('list')">
        <i class="fas fa-list"></i>
        <span>Liste</span>
        <span class="mobile-tab-badge"
              x-show="$store.stats.totalEvents > 0"
              x-text="$store.stats.totalEvents > 99 ? '99+' : $store.stats.totalEvents"></span>
    </button>
</nav>

</div>
{% endblock %}
