{% extends "base.html" %}

{% block content %}
<!-- Filtres en horizontal en haut -->
<div class="row mt-3" x-data>
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <form id="filterForm" @submit.prevent="$store.filters.applyFilters()">
                    <div class="row g-3">
                        <!-- Catégories -->
                        <div class="col-md-8">
                            <label class="form-label"><i class="fas fa-filter"></i> Catégories (cliquez pour multi-sélection)</label>
                            <div class="category-badges-grid">
                                <template x-for="[key, data] in Object.entries($store.filters.allCategoriesMetadata)" :key="key">
                                    <button
                                        type="button"
                                        class="category-badge"
                                        :class="{ 'active': $store.filters.isCategorySelected(key) }"
                                        @click="$store.filters.toggleCategory(key)">
                                        <i :class="`fas fa-${data.icon}`" :style="`color: ${data.color}`"></i>
                                        <span x-text="data.label"></span>
                                    </button>
                                </template>
                            </div>
                        </div>

                        <!-- Dates et actions -->
                        <div class="col-md-4">
                            <label class="form-label"><i class="fas fa-calendar"></i> Période</label>
                            <div class="btn-group w-100 mb-2 date-filters" role="group">
                                <button type="button" class="btn btn-outline-primary btn-sm" @click="$store.filters.setDateRange('today')">
                                    Aujourd'hui
                                </button>
                                <button type="button" class="btn btn-outline-primary btn-sm" @click="$store.filters.setDateRange('week')">
                                    Semaine
                                </button>
                                <button type="button" class="btn btn-outline-primary btn-sm" @click="$store.filters.setDateRange('month')">
                                    Mois
                                </button>
                            </div>
                            <div class="row g-2 mb-2">
                                <div class="col-6">
                                    <input
                                        type="date"
                                        class="form-control form-control-sm"
                                        x-model="$store.filters.dateFrom"
                                        @change="$store.filters.debouncedApplyFilters()"
                                        placeholder="Du">
                                </div>
                                <div class="col-6">
                                    <input
                                        type="date"
                                        class="form-control form-control-sm"
                                        x-model="$store.filters.dateTo"
                                        @change="$store.filters.debouncedApplyFilters()"
                                        placeholder="Au">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary btn-sm w-100 mb-1">
                                <i class="fas fa-search"></i> Appliquer
                            </button>
                            <button type="button" class="btn btn-secondary btn-sm w-100" @click="$store.filters.resetFilters()">
                                <i class="fas fa-undo"></i> Réinitialiser
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Carte (70%) et Liste (30%) -->
<div class="row mt-3" x-data>
    <!-- Carte -->
    <div class="col-md-8">
        <div class="card">
            <div class="card-body p-0">
                <div id="mapContainer" style="height: calc(100vh - 270px);">
                    <!-- Loading State -->
                    <div x-show="$store.filters.loading" class="map-skeleton">
                        <div class="spinner"></div>
                        <p>Chargement de la carte...</p>
                    </div>

                    <!-- Map Iframe -->
                    <iframe
                        id="mapFrame"
                        src="/api/map/generate"
                        style="width: 100%; height: 100%; border: none;">
                    </iframe>
                </div>
            </div>
        </div>
    </div>

    <!-- Liste événements -->
    <div class="col-md-4">
        <div class="card">
            <div class="card-header bg-light">
                <h6 class="mb-0"><i class="fas fa-list"></i> Événements</h6>
            </div>
            <div class="card-body p-2">
                <!-- Stats -->
                <div id="legendPanel">
                    <div id="legendContent">
                        <!-- Loading State -->
                        <template x-if="$store.stats.loading">
                            <div class="skeleton skeleton-line"></div>
                        </template>

                        <!-- Stats Content -->
                        <template x-if="!$store.stats.loading">
                            <div>
                                <h6 class="mb-2">Catégories sélectionnées</h6>

                                <!-- Selected categories stats -->
                                <template x-for="key in Array.from($store.filters.selectedCategories)" :key="key">
                                    <template x-if="$store.stats.getCategoryCount(key) > 0">
                                        <p class="mb-2">
                                            <i :class="`fas fa-${$store.filters.allCategoriesMetadata[key]?.icon}`"
                                               :style="`color: ${$store.filters.allCategoriesMetadata[key]?.color}`"></i>
                                            <span x-text="$store.filters.allCategoriesMetadata[key]?.label"></span>:
                                            <strong x-text="$store.stats.getCategoryCount(key)"></strong>
                                        </p>
                                    </template>
                                </template>

                                <hr>
                                <p class="mb-0">
                                    <strong>Total:</strong>
                                    <strong x-text="$store.stats.totalEvents" class="text-gradient"></strong>
                                </p>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Events List -->
                <div id="eventsListContent">
                    <!-- Loading State -->
                    <template x-if="$store.events.loading">
                        <div>
                            <div class="skeleton skeleton-line skeleton-line--title"></div>
                            <div class="skeleton skeleton-line"></div>
                            <div class="skeleton skeleton-line short"></div>
                        </div>
                    </template>

                    <!-- Empty State -->
                    <template x-if="!$store.events.loading && $store.events.events.length === 0">
                        <div class="empty-state">
                            <i class="fas fa-calendar-times"></i>
                            <h3>Aucun événement trouvé</h3>
                            <p>Essayez d'élargir vos filtres</p>
                            <button @click="$store.filters.resetFilters()">Réinitialiser</button>
                        </div>
                    </template>

                    <!-- Events List -->
                    <template x-if="!$store.events.loading && $store.events.events.length > 0">
                        <div>
                            <!-- Group by type -->
                            <template x-for="[type, eventsList] in Object.entries($store.events.groupedEvents)" :key="type">
                                <template x-if="eventsList.length > 0">
                                    <div class="mb-3">
                                        <!-- Section Header -->
                                        <div class="event-section-header" :style="`color: ${$store.events.getTypeColor(type)}`">
                                            <i :class="`fas fa-${$store.events.getTypeIcon(type)}`"></i>
                                            <span x-text="`${$store.events.getTypeLabel(type)} (${eventsList.length})`"></span>
                                        </div>

                                        <!-- Event Cards -->
                                        <template x-for="event in eventsList" :key="event.id || event.name">
                                            <div
                                                class="event-item"
                                                :style="`border-left-color: ${$store.events.getTypeColor(type)}`"
                                                @click="$store.events.focusOnEvent(event.latitude, event.longitude, event.name)">
                                                <i :class="`fas fa-${$store.events.getTypeIcon(type)} event-icon`" :style="`color: ${$store.events.getTypeColor(type)}`"></i>
                                                <strong x-text="event.name"></strong>
                                                <small x-text="event.location || ''"></small>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Error Toast -->
<div x-data x-show="$store.filters.error" x-transition class="toast-notification">
    <i class="fas fa-exclamation-circle"></i>
    <span x-text="$store.filters.error"></span>
    <button @click="$store.filters.error = null">×</button>
</div>
{% endblock %}
