[pytest]
# Configuration pytest pour le projet TokyoEvent

# Chemins de recherche des tests
testpaths = tests

# Pattern pour découvrir les fichiers de tests
python_files = test_*.py

# Pattern pour découvrir les classes de tests
python_classes = Test*

# Pattern pour découvrir les fonctions de tests
python_functions = test_*

# Options par défaut
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers personnalisés
markers =
    unit: Tests unitaires
    integration: Tests d'intégration
    slow: Tests lents
    web: Tests nécessitant une connexion internet

# Encodage
console_output_style = progress
